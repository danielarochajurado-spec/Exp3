<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuboptimalChoice</title>
    <script src="https://unpkg.com/jspsych@7.2.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.1"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://unpkg.com/jspsych@7.2.1/css/jspsych.css" rel="stylesheet" type="text/css" />

    <style>
        :root {
            --tile: 56px;
            --gap: 4px;
            --panel-w: 260px;
            --bg: #0f1220;
            --fg: #e6e6f0;
            --accent: #7dd3fc;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        #saveExitBtn {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 10001;
            cursor: pointer;
            background: white;
            color: var(--fg);
            border: 1px solid #283056;
            border-radius: 10px;
            padding: 10px 12px;

        }

        #jspsych-target {
            position: relative;
            z-index: 1;
        }

        body {
            margin: 0;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--fg);
            font-family: system-ui, -apple-system, Helvetica, Arial;
        }

        .delay-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            display: none;
        }

        /* The .app class is now inside the jspsych-content container and can be styled */
        .jspsych-content-wrapper .app {
            display: grid;
            grid-template-columns: auto var(--panel-w);
            gap: 16px;
            padding: 16px;
            width: min(100vw, 1100px);
        }

        .board-wrap {
            position: relative;
            background: #151936;
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .35);
        }

        canvas {
            display: block;
            background: #0b0f25;
            border-radius: 8px;
        }

        .hud {
            background: #151936;
            border-radius: 16px;
            padding: 16px;
            display: grid;
            gap: 12px;
            height: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .35);
        }

        .hud h1 {
            margin: 0;
            font-size: 18px;
            letter-spacing: .5px;
            color: var(--accent);
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            font-variant-numeric: tabular-nums;
        }

        .bar {
            height: 10px;
            background: #0b0f25;
            border-radius: 999px;
            overflow: hidden;
        }

        .bar>i {
            display: block;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #22d3ee, #8b5cf6);
        }

        button {
            cursor: pointer;
            background: #0b0f25;
            color: var(--fg);
            border: 1px solid #283056;
            border-radius: 10px;
            padding: 10px 12px;
        }

        button:hover {
            background: #111638;
        }

        .muted {
            opacity: .8;
            font-size: 12px;
        }

        .center-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            /* Ocupa toda la altura disponible */
        }

        .button-container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            /* Espaciado entre los botones */
            margin-top: 20px;
        }

        .choice-btn {
            font-size: 36px;
            padding: 40px 60px;
        }
    </style>
</head>

<body>
    <button id="saveExitBtn"> Salvar e sair </button>
    <div id="jspsych-target"></div>
    <script type="module">

        let framing = 'SuboptimalChoice';

        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";


        // ===== FIREBASE CONFIG =====
        const firebaseConfig = {
            apiKey: "AIzaSyAY0rrn9YvvhKUO6EpiH2uMFaQ8By1fJiU",
            authDomain: "exp3-e28d9.firebaseapp.com",
            projectId: "exp3-e28d9",
            storageBucket: "exp3-e28d9.firebasestorage.app",
            messagingSenderId: "596908762998",
            appId: "1:596908762998:web:1b5db1c4a74a83eaf9bc57"

        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        // ===== FUNCIONES FIREBASE =====
        let data_rows = [];

        function exportDataToExcel(participant_id) {
            const worksheet = XLSX.utils.json_to_sheet(data_rows);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, 'Resultados');
            // Generate the filename using participant ID and date
            const date = new Date().toISOString().replace(/[:.]/g, "-").replace("T", "_").slice(0, 19);
            const filename = `DDGame_results_${participant_id}_${framing}_${date}.xlsx`;

            // Write and download the Excel file
            XLSX.writeFile(workbook, filename);
        }

        async function saveDataToFirebase(participant_id, data_rows) {
            try {
                const date = new Date().toISOString().replace(/[:.]/g, "-").replace("T", "_").slice(0, 19);
                const docId = `DDGame_${date}_${participant_id}_${framing}`;
                const docRef = doc(db, "results", docId);

                await setDoc(docRef, {
                    participant_id,
                    date,
                    data: data_rows
                });
                console.log('✅ Data successfully sent to Firestore');
            } catch (error) {
                console.error('❌ Error sending data to Firestore:', error);
            }
        }

        async function saveAndExit(jsPsych) {
            console.log('Saving and exiting...');
            // Retrieve the participant ID     
            let participant_id = jsPsych?.data?.get()?.values()[0]?.participant_id || localStorage.getItem('participant_id') || "unknown";
            exportDataToExcel(participant_id);
            await saveDataToFirebase(participant_id, data_rows);
            // Save data to localStorage as a backup      
            localStorage.setItem('DDGame', JSON.stringify(data_rows));
            // Redirect or show a confirmation message      
            alert('Your progress has been saved. The game will now end.');
            window.location.href = "index.html"; // Redirect to the main page or a thank-you page
        }
        window.saveAndExit = saveAndExit; // Hacer accesible globalmente

        async function markTaskComplete() {
            const pid = localStorage.getItem('participantId');
            const taskId = localStorage.getItem('currentTask');
            const ref = doc(db, "participants", pid);
            const snap = await getDoc(ref);
            let data = snap.exists() ? snap.data() : { completed: {} };

            data.completed[taskId] = true;
            await setDoc(ref, data);
        }
        window.markTaskComplete = markTaskComplete;
        document.addEventListener('gameComplete', markTaskComplete);

        function match3App(canvasId = 'board', prevState = null) {

            const tile = 56;
            let score = prevState?.score ?? 0;
            let level = prevState?.level ?? 1;
            let achievements = prevState?.achievements ?? 0;
            let rows = prevState?.rows ?? 5;
            let cols = prevState?.cols ?? 5;
            let gemTypes = prevState?.gemTypes ?? 3;
            let addColumnNext = true; // asegúrate de definirlo    

            let grid = [];
            let falling = [];

            const canvas = document.getElementById(canvasId);
            if (!canvas) { console.error(`Elemento #${canvasId} no encontrado`); return null; }
            const ctx = canvas.getContext('2d');
            if (!ctx) { console.error('No se pudo obtener el contexto 2D'); return null; }

            // HUD (opcionales)
            const scoreEl = document.getElementById('score');
            const achEl = document.getElementById('achievements');
            const lvlEl = document.getElementById('level');
            const sizeEl = document.getElementById('size');
            const typesEl = document.getElementById('types');
            const lvlBar = document.getElementById('lvlbar');
            const lvlInfo = document.getElementById('level-info');
            const shuffleBtn = document.getElementById('shuffle');

            const palette = ['#60a5fa', '#f472b6', '#34d399', '#fbbf24', '#8f00ff', '#ef4444', '#c084fc'];
            const colorFor = id => palette[id % palette.length];
            const randInt = max => Math.floor(Math.random() * max);
            const inBounds = (r, c) => r >= 0 && r < rows && c >= 0 && c < cols;
            const newRandomGem = () => randInt(Math.max(3, gemTypes));


            function resizeCanvas() { canvas.width = cols * tile; canvas.height = rows * tile; }

            function generateGrid() {
                grid = Array.from({ length: rows }, () => Array.from({ length: cols }, () => -1));
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        let g;
                        do { g = newRandomGem(); }
                        while (
                            (c >= 2 && grid[r][c - 1] === g && grid[r][c - 2] === g) ||
                            (r >= 2 && grid[r - 1][c] === g && grid[r - 2][c] === g)
                        );
                        grid[r][c] = g;
                    }
                }
            }

            if (!CanvasRenderingContext2D.prototype.roundRect) {
                CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                    if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
                    this.beginPath();
                    this.moveTo(x + r, y);
                    this.arcTo(x + w, y, x + w, y + h, r);
                    this.arcTo(x + w, y + h, x, y + h, r);
                    this.arcTo(x, y + h, x, y, r);
                    this.arcTo(x, y, x + w, y, r);
                    this.closePath();
                    return this;
                };
            }

            function drawCell(r, c) {
                const x = c * tile, y = r * tile, v = grid[r][c];
                ctx.fillStyle = '#0b0f25';
                ctx.fillRect(x, y, tile, tile);
                if (v >= 0) {
                    ctx.fillStyle = colorFor(v);
                    const pad = 6;
                    ctx.beginPath();
                    ctx.roundRect(x + pad, y + pad, tile - pad * 2, tile - pad * 2, 10);
                    ctx.fill();
                    ctx.globalAlpha = .1; ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(x + tile * 0.35, y + tile * 0.35, tile * 0.22, 0, Math.PI * 2); ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }

            function drawBoard() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) if (grid[r][c] >= 0) drawCell(r, c);
                for (const f of falling) {
                    const y = f.fromY + (f.toY - f.fromY) * easeOut(f.progress);
                    ctx.fillStyle = colorFor(f.gem);
                    const pad = 6;
                    ctx.beginPath();
                    ctx.roundRect(f.x + pad, y + pad, tile - pad * 2, tile - pad * 2, 10);
                    ctx.fill();
                }
            }

            const easeOut = t => 1 - Math.pow(1 - t, 3);
            function animate() {
                const still = [];
                for (const f of falling) {
                    f.progress += 0.08;
                    if (f.progress < 1) still.push(f);
                }
                falling = still;
                drawBoard();
                if (falling.length > 0) requestAnimationFrame(animate);
            }

            function findMatches() {
                const toClear = new Set();
                for (let r = 0; r < rows; r++) {
                    let runVal = grid[r][0], runStart = 0;
                    for (let c = 1; c <= cols; c++) {
                        const v = c < cols ? grid[r][c] : NaN;
                        if (v !== runVal) {
                            const len = c - runStart;
                            if (runVal >= 0 && len >= 3) for (let k = runStart; k < c; k++) toClear.add(`${r},${k}`);
                            runVal = v; runStart = c;
                        }
                    }
                }
                for (let c = 0; c < cols; c++) {
                    let runVal = grid[0][c], runStart = 0;
                    for (let r = 1; r <= rows; r++) {
                        const v = r < rows ? grid[r][c] : NaN;
                        if (v !== runVal) {
                            const len = r - runStart;
                            if (runVal >= 0 && len >= 3) for (let k = runStart; k < r; k++) toClear.add(`${k},${c}`);
                            runVal = v; runStart = r;
                        }
                    }
                }
                return toClear;
            }

            function collapseAndRefill() {
                for (let c = 0; c < cols; c++) {
                    let write = rows - 1;
                    for (let r = rows - 1; r >= 0; r--) {
                        if (grid[r][c] >= 0) {
                            if (write !== r) {
                                const gem = grid[r][c];
                                falling.push({ gem, x: c * tile, fromY: r * tile, toY: write * tile, progress: 0 });
                                grid[write][c] = gem; grid[r][c] = -1;
                            }
                            write--;
                        }
                    }
                    for (let r = write; r >= 0; r--) {
                        const gem = newRandomGem();
                        grid[r][c] = gem;
                        falling.push({ gem, x: c * tile, fromY: -tile, toY: r * tile, progress: 0 });
                    }
                }
            }

            function swapIfValid(r1, c1, r2, c2) {
                if (!inBounds(r1, c1) || !inBounds(r2, c2)) return false;
                const dr = Math.abs(r1 - r2), dc = Math.abs(c1 - c2);
                if (dr + dc !== 1) return false;
                [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
                const m = findMatches();
                if (m.size === 0) {
                    [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
                    return false;
                }
                return true;
            }

            function resolveCascade() {
                let groupsCleared = 0;
                while (true) {
                    const toClear = findMatches();
                    if (toClear.size === 0) break;
                    const cells = [...toClear].map(s => s.split(',').map(Number));
                    const vis = new Set(); const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
                    function dfs(r, c) { const key = `${r},${c}`; if (!toClear.has(key) || vis.has(key)) return 0; vis.add(key); let cnt = 1; for (const [dR, dC] of dirs) cnt += dfs(r + dR, c + dC); return cnt; }
                    let localGroups = 0;
                    for (const s of toClear) { if (!vis.has(s)) { dfs(...s.split(',').map(Number)); localGroups++; } }
                    score += cells.length * 1;
                    achievements += localGroups; updateHUD();
                    for (const [r, c] of cells) grid[r][c] = -1;
                    collapseAndRefill(); animate();
                    groupsCleared += localGroups;
                }
                if (groupsCleared > 0) maybeLevelUp();
            }

            function maybeLevelUp() {
                const nextAt = level * 10;
                const progress = Math.min(achievements / nextAt, 1);
                if (lvlBar) lvlBar.style.width = (progress * 100).toFixed(1) + '%';
                if (lvlInfo) lvlInfo.textContent = `${achievements % nextAt} / ${nextAt}`;
                if (achievements >= nextAt) {
                    level++;
                    if (addColumnNext) cols++; else rows++;
                    addColumnNext = !addColumnNext;
                    gemTypes = Math.min(palette.length, 3 + Math.floor(level / 2));
                    resizeCanvas(); generateGrid(); drawBoard(); updateHUD();
                }
            }

            function updateHUD() {
                if (scoreEl) scoreEl.textContent = score.toLocaleString();
                if (achEl) achEl.textContent = achievements.toLocaleString();
                if (lvlEl) lvlEl.textContent = level;
                if (sizeEl) sizeEl.textContent = `${rows} × ${cols}`;
                if (typesEl) typesEl.textContent = gemTypes;
                const nextAt = level * 10;
                const progress = Math.min(achievements / nextAt, 1);
                if (lvlBar) lvlBar.style.width = (progress * 100).toFixed(1) + '%';
                if (lvlInfo) lvlInfo.textContent = `${achievements % nextAt} / ${nextAt}`;
            }

            let sel = null;
            canvas.addEventListener('click', (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left, y = e.clientY - rect.top;
                const c = Math.floor(x / tile), r = Math.floor(y / tile);
                if (!inBounds(r, c)) return;
                if (!sel) { sel = { r, c }; highlight(sel); }
                else {
                    swapIfValid(sel.r, sel.c, r, c);
                    sel = null; resolveCascade(); drawBoard();
                }
            });

            function highlight(cell) {
                drawBoard();
                ctx.save(); ctx.lineWidth = 3; ctx.strokeStyle = '#f59e0b';
                ctx.strokeRect(cell.c * tile + 2, cell.r * tile + 2, tile - 4, tile - 4); ctx.restore();
            }


            if (shuffleBtn) shuffleBtn.addEventListener('click', () => {
                for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) grid[r][c] = newRandomGem();
                if (findMatches().size === 0) { grid[0][0] = grid[0][1]; grid[0][2] = grid[0][1]; }
                drawBoard();
            });

            // API pública
            function init() { resizeCanvas(); generateGrid(); drawBoard(); updateHUD(); }
            init();

            return {
                getState: () => ({ score, achievements, level, rows, cols, gemTypes })
            };
        }

        // Ejecutar cuando el DOM esté listo

        document.addEventListener('DOMContentLoaded', () => {

            let jsPsychInstance;

            const jsPsych = initJsPsych({

                override_safe_mode: true,

                on_finish: async () => {
                    let participant_id = jsPsych?.data?.get()?.values()[0]?.participant_id || localStorage.getItem('participant_id') || "unknown";
                    exportDataToExcel(participant_id);
                    await saveDataToFirebase(participant_id, data_rows);
                    await markTaskComplete();
                    window.location.href = "index.html";
                }
            });

            jsPsychInstance = jsPsych;

            const saveExitBtn = document.createElement('button');
            saveExitBtn.id = 'saveExitBtn';
            saveExitBtn.textContent = 'Salvar e sair';
            saveExitBtn.style.position = 'fixed';
            saveExitBtn.style.top = '10px';
            saveExitBtn.style.right = '10px';
            saveExitBtn.style.zIndex = '10001';
            saveExitBtn.style.backgroundColor = 'white';
            saveExitBtn.style.color = 'white';
            saveExitBtn.style.padding = '10px 20px';
            saveExitBtn.style.borderRadius = '8px';
            saveExitBtn.style.cursor = 'pointer';
            saveExitBtn.onclick = () => saveAndExit(jsPsychInstance); // Usar la instancia global
            document.body.appendChild(saveExitBtn);

            // ======= Variables =======
            const delay_conditions = [
                { small: 6250, long: 6250 },
                { small: 3760, long: 8750 },
                { small: 2500, long: 10000 },
                { small: 1780, long: 10600 }
            ];
            let num_forced_trials = 20;
            let numFreeTrials = 15;
            let trial_number = 0;
            let total_game_score = 0;
            let gameDuration = 12000;

            let free_choice_tracker = {
                choices: []
            };

            function buildInitialTrials() {
                const participant_id_trial = {
                    type: jsPsychSurveyText,
                    questions: [{
                        prompt: '<h2>Bem-vindo ao experimento.</h2><p>Se você já leu e assinou o termo de consentimento, insira seu número de participante para começar.</p><p>Se ainda não o fez, chame o experimentador.</p>',
                        placeholder: 'Ex: 101',
                        required: true,
                        name: 'participant_id'
                    }],
                    on_load: () => {
                        const saveExitBtn = document.getElementById('saveExitBtn');
                        if (!saveExitBtn) {
                            const newBtn = document.createElement('button');
                            newBtn.id = 'saveExitBtn';
                            newBtn.textContent = 'Salvar e sair';
                            newBtn.style.position = 'fixed';
                            newBtn.style.top = '10px';
                            newBtn.style.right = '10px';
                            newBtn.style.zIndex = '10001';
                            newBtn.style.backgroundColor = 'transparent';
                            newBtn.style.color = 'white';
                            newBtn.style.padding = '10px 20px';
                            newBtn.style.borderRadius = '8px';
                            newBtn.style.cursor = 'pointer';
                            newBtn.onclick = saveAndExit;
                            document.body.appendChild(newBtn);
                            console.log('Salvar e sair button re-added');
                        };
                        if (!window.gameState) {
                            window.gameState = {
                                score: 0,
                                level: 1,
                                achievements: 0,
                                rows: 5,
                                cols: 5,
                                gemTypes: 3
                            };
                        }
                    },
                    on_finish: (data) => {
                        const participant_id = data.response.participant_id;
                        if (participant_id) {

                            jsPsych.data.addProperties({
                                participant_id: participant_id
                            });


                            localStorage.setItem('participant_id', participant_id);
                        }
                    }
                };
                const instructions = {
                    type: jsPsychHtmlButtonResponse,
                    stimulus: `<h2>Bem-vindo!</h2>
            <p>
                Neste jogo, você vai ver um tabuleiro com peças de cores.<br> 
                Você deve alinhar 3 ou mais peças da mesma cor para <br>
                eliminá-las e ganhar pontos, clicando em duas peças  <br>
                adjacentes para trocá-las de posição.
                <br><br>
                O jogo será interrompido periodicamente.<br>
                Nessas interrupções, o jogo ficará indisponível e você deverá <br>
                clicar nas opções disponíveis para continuar jogando.
                 <br><br>
                 Preste atenção, pois as condições podem variar.
                 <br>
                 Não há escolhas certas ou erradas; selecione a opção que você preferir.
                <br><br>
                Esta tarefa tem uma duração total fixa de 30 minutos e
                <br>
                as suas escolhas não alteram essa duração.
                <br><br>
                Clique em “Começar” para iniciar a tarefa.
                </p>`,
                    choices: ['Começar']

                };
                const initialMatch3Trial = {
                    type: jsPsychHtmlButtonResponse,
                    stimulus: () => `    
      <div class="app">       
      <div class="board-wrap">         
        <canvas id="board" width="672" height="672" aria-label="tabuleiro"></canvas>       
        </div>        
        <aside class="hud">       
          <h1>Caça-cores</h1>         

                        <div class="row"><span>Pontos</span><strong id="score">0</strong></div>
                        <div class="row"><span>Nível</span><strong id="level">1</strong></div>
                        <div>
                            <div class="row"><span>Progresso</span><span class="muted" id="level-info"></span></div>
                            <div class="bar"><i id="lvlbar"></i></div>
                        </div>
                        <div class="row"><span>Tamanho</span><strong id="size">8 × 8</strong></div>
                        <div class="row"><span>Cores</span><strong id="types">5</strong></div>
                        <div class="row"><span>Duração Total</span><strong id="duration">30 minutos</strong></div>
                        <p class="muted">Tip: clique em dois peças adjacentes para troca-las de posição. A troca funciona quando tem pelo menos três peças continuas da mesma cor.</p>
              
          </aside>   
          </div> 
          `,
                    choices: [],
                    trial_duration: () => gameDuration,
                    on_load: () => {
                        const display_el = jsPsych.getDisplayElement();
                        const canvas = display_el.querySelector('#board');
                        if (canvas) {
                            window._match3 = match3App('board');
                        } else {
                            console.error('Elemento #board no encontrado');
                        }
                    },
                    on_finish: () => {
                        if (window._match3) {
                            window.gameState = window._match3.getState();
                        } else {
                            console.warn('Match-3 no inicializado');
                        }
                    }
                };

                return [participant_id_trial, instructions, initialMatch3Trial];

            }

            function choiceTrial(condition_index, tracker) {
                return {
                    type: jsPsychHtmlButtonResponse,
                    stimulus: `<div class="center-content">
                        <p style="color:white; font-size:24px;">Escolha</p>      
                        </div>`,
                    choices: ['+', 'o'],
                    button_html: '<button class="jspsych-btn choice-btn">%choice%</button>',
                    on_finish: (data) => {
                        const choice = data.response === 0 ? '+' : 'o';
                        data.choice = choice;
                        data.condition = condition_index;
                        data.phase = "free";

                        tracker.choices.push(choice);
                        console.log(
                            "trial", tracker.choices.length,
                            "choice", choice,
                            "choice trial:", data);
                    }
                };
            }

            function delayScreen(condition) {
                return {
                    type: jsPsychHtmlButtonResponse,
                    stimulus: () => {
                        const last = jsPsych.data.get().last(1).values()[0];
                        let text = "";
                        let duration = 0;

                        if (last.choice === '+') {
                            // opción informada
                            if (Math.random() < 0.2) {
                                duration = condition.small;
                                text = `Espere pouco`;
                            } else {
                                duration = condition.long;
                                text = `Espere muito`;
                            }

                        } else {
                            // opción no informada
                            const label = Math.random() < 0.2 ? "Espere" : "Aguarde";
                            duration = Math.random() < 0.5 ? condition.small : condition.long;
                            text = label;
                        }

                        // guardar info
                        last.delay_duration = duration;
                        last.delay_type = last.choice === '+' ? 'signaled' : 'unsignaled';
                        last.delay_tet = text;


                        return `<div class="center-content">
                        <p style="color:white; font-size:28px;">${text}</p>
                        </div>`;
                    },
                    choices: [],
                    trial_duration: () => {
                        const last = jsPsych.data.get().last(1).values()[0];
                        return last.delay_duration;
                    }
                };
            }

            function gameTrial(condition, condition_index) {
                return {
                    type: jsPsychHtmlButtonResponse,
                    stimulus: `
                    <div class="app">
                        <div class="board-wrap">
                            <canvas id="board" width="672" height="672"></canvas>
                        </div>

                        <aside class="hud">
                            <h1>Caça-cores</h1>

                            <div class="row"><span>Pontos</span><strong id="score">0</strong></div>
                            <div class="row"><span>Nível</span><strong id="level">1</strong></div>

                            <div>
                                <div class="row"><span>Progresso</span><span class="muted" id="level-info"></span></div>
                                <div class="bar"><i id="lvlbar"></i></div>
                            </div>

                            <div class="row"><span>Tamanho</span><strong id="size">5 × 5</strong></div>
                            <div class="row"><span>Cores</span><strong id="types">3</strong></div>

                            <div class="row">
                                <button id="shuffle">Mezclar</button>
                            </div>

                            <p class="muted">
                            Tip: clique em duas peças adjacentes para trocá-las.
                            </p>
                        </aside>
                    </div>
                    `,
                    choices: [],
                    trial_duration: () => gameDuration,

                    on_load: () => {

                        if (!window.gameState) {
                            window.gameState = {
                                score: 0,
                                level: 1,
                                achievements: 0,
                                rows: 5,
                                cols: 5,
                                gemTypes: 3
                            };
                        }
                        const currentScore = window.gameState.score ?? 0;

                        const newLevel = Math.floor(currentScore / 200) + 1;
                        const newAchievements = Math.floor(currentScore / 200) + 1;
                        const newGridSize = Math.min(14, 5 + Math.floor(newLevel / 2));
                        window.gameState.level = newLevel;
                        window.gameState.achievements = newAchievements;
                        window.gameState.rows = newGridSize;
                        window.gameState.cols = newGridSize;
                        window._match3 = match3App('board', window.gameState);

                        const state = window.gameState;

                        document.getElementById('score').textContent = state.score;
                        document.getElementById('level').textContent = state.level;
                        document.getElementById('size').textContent = `${state.rows} × ${state.cols}`;
                        document.getElementById('types').textContent = state.gemTypes;

                        const progress = Math.min(state.achievements / (state.level * 10), 1);
                        document.getElementById('lvlbar').style.width = (progress * 100).toFixed(1) + '%';
                        document.getElementById('level-info').textContent =
                            `${state.achievements % (state.level * 10)} / ${state.level * 10}`;
                    },

                    on_finish: (data) => {

                        if (window._match3) {
                            window.gameState = window._match3.getState();
                        }

                        const trials = jsPsych.data.get().values().slice().reverse();

                        const choice_trial = trials.find(t => t.choice !== undefined);
                        const delay_trial = trials.find(t => t.delay_duration !== undefined);

                        if (!choice_trial) {
                            console.warn("No choice trial found");
                            return;
                        }

                        trial_number++;

                        const state = window.gameState || {};

                        total_game_score += state.score || 0;

                        const row = {
                            condition: condition.small/condition.long,
                            phase: choice_trial.phase ?? "free",

                            delay_duration: delay_trial.delay_duration,
                            delay_type: delay_trial.delay_type,
                            delay_text: delay_trial.delay_text,
                            delay_small: condition.small,
                            delay_large: condition.long,

                            A_l: gameDuration,

                            choice: choice_trial.choice,
                            latency: choice_trial.rt,
                            trial_number: trial_number,

                            game_score: state.score || 0,
                            total_game_score: total_game_score,

                            _data_level_: state.level,
                            _data_achievements: state.achievements,
                            _data_rows: state.rows,
                            _data_cols: state.cols,
                            _data_gemTypes: state.gemTypes,

                            framing: framing
                        };

                        data_rows.push(row);
                        console.log({
                            trial: trial_number,
                            choice: choice_trial.choice,
                            delay: delay_trial.delay_duration
                        })

                    }
                };
            }

            function ITI() {
                return {
                    type: jsPsychHtmlButtonResponse,
                    stimulus: `<div></div>`,
                    choices: [],
                    trial_duration: 1000
                };
            }

            function buildFreeLoop(condition, index) {

                let tracker = { choices: [] };

                const free_block = {

                    timeline: [
                        choiceTrial(index, tracker),
                        delayScreen(condition),
                        gameTrial(condition, index),
                        ITI()
                    ],
                    loop_function: () => {
                        return tracker.choices.length < numFreeTrials;
                    }
                };

                return free_block;
            }

            function buildCondition(condition, index) {
                
                trial_number = 0;
                let timeline = [];

                // ===== FORCED RANDOM BALANCEADO =====
                let forced_choices = [];

                // 15 trials, balanced
                for (let i = 0; i < num_forced_trials; i++) {
                    forced_choices.push(i % 2 === 0 ? '+' : 'o');
                }

                // shuffle properly
                for (let i = forced_choices.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [forced_choices[i], forced_choices[j]] = [forced_choices[j], forced_choices[i]];
                }

                forced_choices.forEach((forced_choice) => {

                    timeline.push({
                        type: jsPsychHtmlButtonResponse,
                        stimulus: `<p style="color:white;">Clique</p>`,
                        button_html: '<button class="jspsych-btn choice-btn">%choice%</button>',
                        choices: [forced_choice],
                        on_finish: (data) => {
                            data.choice = forced_choice;
                            data.condition = index;
                            data.phase = "forced";

                            console.log("FORCED TRIAL:", data);
                        }
                    });

                    timeline.push(delayScreen(condition));
                    timeline.push(gameTrial(condition, index));
                    timeline.push(ITI());
                });

                // ===== LIBRES =====
                timeline.push(buildFreeLoop(condition, index));

                return timeline;
            }

            function buildExperiment() {
                let timeline = [];

                delay_conditions.forEach((cond, i) => {
                    timeline.push(...buildCondition(cond, i));
                });

                return timeline;
            }


            const main_timeline = [
                ...buildInitialTrials(),
                ...buildExperiment()
            ];

            jsPsych.run(main_timeline);
        });
    </script>
